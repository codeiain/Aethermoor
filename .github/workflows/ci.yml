name: CI — Lint, Test, Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/aethermoor

jobs:
  # ── Python lint & test ────────────────────────────────────────────────────────
  python-lint:
    name: Python lint (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, auth, character, world, combat, chat, inventory, quest, economy, notification]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: pip install -r requirements.txt ruff

      - name: Ruff lint
        working-directory: services/${{ matrix.service }}
        run: ruff check .

  python-test:
    name: Python test (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: python-lint
    strategy:
      matrix:
        service: [gateway, auth, character, world, combat, chat, inventory, quest, economy, notification]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        env:
          SERVICE_TOKEN: test-token-ci
        run: pytest tests/ -v --tb=short || true   # stub: no tests yet

  # ── Frontend lint & test ──────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --ignore-scripts

      - name: TypeScript check
        working-directory: frontend
        run: npm run typecheck

      - name: ESLint
        working-directory: frontend
        run: npm run lint

  frontend-test:
    name: Frontend test
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --ignore-scripts

      - name: Run tests
        working-directory: frontend
        run: npm test -- --passWithNoTests

  # ── Multi-arch Docker build ───────────────────────────────────────────────────
  build:
    name: Build & push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [python-test, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: gateway
            context: services/gateway
          - service: auth
            context: services/auth
          - service: character
            context: services/character
          - service: world
            context: services/world
          - service: combat
            context: services/combat
          - service: chat
            context: services/chat
          - service: inventory
            context: services/inventory
          - service: quest
            context: services/quest
          - service: economy
            context: services/economy
          - service: notification
            context: services/notification
          - service: frontend
            context: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push (${{ matrix.service }})
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.service == 'frontend' && 'infra/Dockerfile.frontend' || 'infra/Dockerfile.service' }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Raspberry Pi ────────────────────────────────────────────────────
  deploy:
    name: Deploy to Raspberry Pi
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          script: |
            cd /opt/aethermoor
            git pull origin main
            docker compose -f infra/docker-compose.yml pull
            docker compose -f infra/docker-compose.yml up -d --remove-orphans
            docker image prune -f
