<svg xmlns="http://www.w3.org/2000/svg" width="96" height="32" viewBox="0 0 96 32" role="img" aria-label="Blightbear Death Animation — 3 frames">
  <!-- E-6 Blightbear — death animation, 3×32x32 sprite sheet (mini-boss) -->
  <!-- GDD: Blight-fused skeleton armour shatters on death; corruption energy disperses -->
  <!-- Palette: body #1A0E04 darkening, armour #0E0804 cracking, blight #7B4FC8 flaring then fading, eyes #D06000 extinguishing -->
  <!-- Phaser frame strip: frame 0 x=0, frame 1 x=32, frame 2 x=64 -->

  <!-- Frame 0: Staggering — stumbling, blight armour cracking and flaring with light -->
  <g transform="translate(0,0)">
    <!-- Hind legs buckling — one splayed out -->
    <rect x="5"  y="22" width="6"  height="10" rx="1" fill="#1A0E04"/>
    <rect x="19" y="24" width="7"  height="8"  rx="1" fill="#1A0E04" transform="rotate(15,22,28)"/>
    <rect x="4"  y="29" width="8"  height="3"  rx="1" fill="#0E0804"/>
    <!-- Main body tilted — staggering right -->
    <rect x="7"  y="12" width="20" height="14" rx="3" fill="#1A0E04" transform="rotate(-8,17,19)"/>
    <!-- Shoulder armour cracking — blight light blazing from fractures -->
    <rect x="4"  y="11" width="8"  height="6"  rx="1" fill="#0E0804" transform="rotate(-5,8,14)"/>
    <rect x="20" y="11" width="8"  height="6"  rx="1" fill="#0E0804" transform="rotate(5,24,14)"/>
    <!-- Blight seams bursting wide open — max glow on death flash -->
    <line x1="5"  y1="12" x2="11" y2="16" stroke="#BB8FFF" stroke-width="2"   opacity="0.95"/>
    <line x1="7"  y1="13" x2="9"  y2="16" stroke="#9B6FE8" stroke-width="1"   opacity="0.8"/>
    <line x1="21" y1="12" x2="27" y2="16" stroke="#BB8FFF" stroke-width="2"   opacity="0.95"/>
    <line x1="23" y1="11" x2="25" y2="16" stroke="#9B6FE8" stroke-width="1"   opacity="0.8"/>
    <!-- Back plate cracking through -->
    <rect x="8"  y="10" width="16" height="5"  rx="1" fill="#0E0804"/>
    <line x1="10" y1="11" x2="22" y2="11" stroke="#BB8FFF" stroke-width="1.5" opacity="0.9"/>
    <line x1="16" y1="10" x2="16" y2="15" stroke="#9B6FE8" stroke-width="1.5" opacity="0.85"/>
    <!-- Left foreleg dragging -->
    <rect x="2"  y="19" width="7"  height="10" rx="1" fill="#1A0E04" opacity="0.9"/>
    <rect x="1"  y="27" width="8"  height="3"  rx="1" fill="#0E0804"/>
    <!-- Right foreleg buckling inward -->
    <rect x="22" y="20" width="7"  height="9"  rx="1" fill="#1A0E04" transform="rotate(20,25,24)"/>
    <!-- Head — dropping, mouth open in dying roar -->
    <rect x="9"  y="5"  width="14" height="10" rx="3" fill="#1A0E04" transform="rotate(-10,16,10)"/>
    <rect x="20" y="8"  width="7"  height="5"  rx="2" fill="#2B1808" transform="rotate(-10,23,10)"/>
    <!-- Eyes — one dimming, one still bright in death flash -->
    <rect x="11" y="7"  width="3"  height="3"  fill="#D06000" opacity="0.5"/>
    <rect x="16" y="7"  width="3"  height="3"  fill="#FF8000"/>
    <rect x="17" y="7"  width="1"  height="1"  fill="#FFBE40" opacity="0.8"/>
    <!-- Mouth dropping open -->
    <rect x="20" y="11" width="7"  height="4"  rx="1" fill="#0A0604" transform="rotate(-10,23,13)"/>
    <!-- Blight particles starting to escape -->
    <circle cx="8"  cy="8"  r="1.5" fill="#9B6FE8" opacity="0.6"/>
    <circle cx="24" cy="7"  r="1.5" fill="#BB8FFF" opacity="0.65"/>
    <circle cx="18" cy="4"  r="1"   fill="#9B6FE8" opacity="0.5"/>
  </g>

  <!-- Frame 1: Collapsing — bear falling to ground, blight energy dispersing from shattered armour -->
  <g transform="translate(32,0)">
    <!-- Blight energy burst outward as armour shatters -->
    <circle cx="16" cy="14" r="10" fill="#5A3A80" opacity="0.15"/>
    <line x1="16" y1="14" x2="2"  y2="4"  stroke="#9B6FE8" stroke-width="1"   opacity="0.5"/>
    <line x1="16" y1="14" x2="30" y2="4"  stroke="#9B6FE8" stroke-width="1"   opacity="0.5"/>
    <line x1="16" y1="14" x2="2"  y2="24" stroke="#7B4FC8" stroke-width="0.8" opacity="0.4"/>
    <line x1="16" y1="14" x2="30" y2="24" stroke="#7B4FC8" stroke-width="0.8" opacity="0.4"/>
    <!-- Armour plate fragments flying off -->
    <rect x="3"  y="5"  width="5"  height="4"  rx="1" fill="#0E0804" opacity="0.9" transform="rotate(-30,5,7)"/>
    <rect x="24" y="3"  width="5"  height="4"  rx="1" fill="#0E0804" opacity="0.9" transform="rotate(25,26,5)"/>
    <rect x="0"  y="14" width="4"  height="4"  rx="1" fill="#0E0804" opacity="0.8" transform="rotate(-15,2,16)"/>
    <rect x="28" y="12" width="4"  height="4"  rx="1" fill="#0E0804" opacity="0.8" transform="rotate(20,30,14)"/>
    <!-- Body hitting the ground — side-view collapse -->
    <rect x="6"  y="20" width="22" height="12" rx="3" fill="#1A0E04" opacity="0.95"/>
    <!-- Legs sprawled out -->
    <rect x="2"  y="22" width="7"  height="8"  rx="1" fill="#1A0E04"/>
    <rect x="23" y="22" width="7"  height="8"  rx="1" fill="#1A0E04" transform="rotate(10,26,26)"/>
    <rect x="7"  y="28" width="7"  height="4"  rx="1" fill="#1A0E04"/>
    <rect x="18" y="27" width="7"  height="5"  rx="1" fill="#1A0E04" transform="rotate(-5,21,29)"/>
    <!-- Head on ground -->
    <rect x="5"  y="14" width="14" height="9"  rx="3" fill="#1A0E04"/>
    <rect x="17" y="16" width="7"  height="5"  rx="2" fill="#2B1808"/>
    <rect x="18" y="17" width="2"  height="2"  fill="#0A0604"/>
    <!-- Eyes dimming — both now very low -->
    <rect x="8"  y="16" width="3"  height="3"  fill="#803000" opacity="0.6"/>
    <rect x="13" y="16" width="3"  height="3"  fill="#A04000" opacity="0.5"/>
    <!-- Blight wisps escaping upward from shattered armour -->
    <circle cx="10" cy="10" r="2"   fill="#9B6FE8" opacity="0.55"/>
    <circle cx="22" cy="8"  r="2"   fill="#7B4FC8" opacity="0.5"/>
    <circle cx="16" cy="6"  r="2.5" fill="#BB8FFF" opacity="0.4"/>
    <circle cx="7"  cy="5"  r="1.5" fill="#7B4FC8" opacity="0.4"/>
    <circle cx="25" cy="6"  r="1.5" fill="#9B6FE8" opacity="0.45"/>
    <!-- Paws/claws limp -->
    <rect x="1"  y="28" width="7"  height="3"  rx="1" fill="#0E0804" opacity="0.9"/>
    <rect x="24" y="27" width="7"  height="3"  rx="1" fill="#0E0804" opacity="0.9"/>
  </g>

  <!-- Frame 2: Dead — prone form, blight energy fully dissipated -->
  <g transform="translate(64,0)">
    <!-- Dead bear lying flat — dark silhouette -->
    <!-- Body mass prone, very low profile -->
    <rect x="4"  y="22" width="24" height="9"  rx="3" fill="#120A04"/>
    <!-- Legs splayed -->
    <rect x="1"  y="24" width="8"  height="6"  rx="1" fill="#120A04"/>
    <rect x="23" y="24" width="8"  height="6"  rx="1" fill="#120A04"/>
    <rect x="6"  y="28" width="7"  height="4"  rx="1" fill="#120A04"/>
    <rect x="19" y="27" width="7"  height="5"  rx="1" fill="#120A04"/>
    <!-- Head resting on ground -->
    <rect x="4"  y="17" width="14" height="8"  rx="3" fill="#120A04"/>
    <rect x="16" y="19" width="7"  height="5"  rx="2" fill="#1A0E04"/>
    <!-- Destroyed armour plate remnants — dark, no glow -->
    <rect x="8"  y="20" width="9"  height="4"  rx="1" fill="#0A0604" opacity="0.8"/>
    <rect x="19" y="20" width="7"  height="3"  rx="1" fill="#0A0604" opacity="0.7"/>
    <!-- Eyes fully dark -->
    <rect x="7"  y="19" width="3"  height="3"  fill="#0A0604"/>
    <rect x="12" y="19" width="3"  height="3"  fill="#0A0604"/>
    <!-- Paw claws splayed on ground -->
    <rect x="0"  y="28" width="2"  height="3"  fill="#0A0604"/>
    <rect x="3"  y="29" width="2"  height="3"  fill="#0A0604"/>
    <rect x="25" y="28" width="2"  height="3"  fill="#0A0604"/>
    <rect x="28" y="29" width="2"  height="3"  fill="#0A0604"/>
    <!-- Final residual blight — tiny fading wisps, barely visible -->
    <circle cx="12" cy="15" r="1.5" fill="#3A1A50" opacity="0.3"/>
    <circle cx="20" cy="13" r="1"   fill="#3A1A50" opacity="0.25"/>
    <circle cx="16" cy="11" r="1.5" fill="#2A1040" opacity="0.2"/>
    <!-- Ground pool of dissolved blight -->
    <ellipse cx="16" cy="31" rx="12" ry="1.5" fill="#1A0830" opacity="0.3"/>
  </g>
</svg>
