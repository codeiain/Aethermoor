<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Bog Troll Idle Frame">
  <!-- Bog Troll — level 8-12 enemy, idle frame, 32x32 -->
  <!-- Legs — wide squat stance -->
  <rect x="7"  y="24" width="6"  height="8"  fill="#1A3A1A"/>
  <rect x="19" y="24" width="6"  height="8"  fill="#1A3A1A"/>
  <!-- Body — wide squat torso -->
  <rect x="6"  y="12" width="20" height="14" rx="2" fill="#2A4A2A"/>
  <!-- Skin texture specks on body -->
  <circle cx="10" cy="16" r="1.2" fill="#0D2010" opacity="0.7"/>
  <circle cx="18" cy="20" r="1.0" fill="#0D2010" opacity="0.7"/>
  <circle cx="24" cy="15" r="1.1" fill="#0D2010" opacity="0.65"/>
  <!-- Arms -->
  <rect x="0"  y="14" width="7"  height="5"  rx="1" fill="#1A3A1A"/>
  <rect x="25" y="14" width="7"  height="5"  rx="1" fill="#1A3A1A"/>
  <!-- Fists -->
  <rect x="0"  y="18" width="6"  height="5"  rx="1" fill="#2A4A2A"/>
  <rect x="26" y="18" width="6"  height="5"  rx="1" fill="#2A4A2A"/>
  <!-- Moss patches on shoulders -->
  <rect x="6"  y="12" width="6"  height="4"  rx="1" fill="#1A2A0E" opacity="0.8"/>
  <rect x="20" y="12" width="6"  height="4"  rx="1" fill="#1A2A0E" opacity="0.8"/>
  <!-- Head — large blocky -->
  <rect x="9"  y="4"  width="14" height="10" rx="2" fill="#2A4A2A"/>
  <!-- Brow ridge -->
  <rect x="9"  y="6"  width="14" height="3"  fill="#1A3A1A"/>
  <!-- Eyes — yellow -->
  <rect x="12" y="8"  width="3"  height="3"  fill="#F5C842"/>
  <rect x="18" y="8"  width="3"  height="3"  fill="#F5C842"/>
  <!-- Nose holes -->
  <rect x="14" y="11" width="2"  height="2"  fill="#0D2010"/>
  <!-- Mouth -->
  <rect x="11" y="13" width="10" height="2"  fill="#0D2010"/>
</svg>
