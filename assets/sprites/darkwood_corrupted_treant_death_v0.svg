<svg xmlns="http://www.w3.org/2000/svg" width="96" height="32" viewBox="0 0 96 32" role="img" aria-label="Corrupted Treant Sprout Death Animation — 3 frames">
  <!-- E-3 Corrupted Treant Sprout — death animation, 3×32x32 sprite sheet -->
  <!-- Palette: bark #1C1004/#2B1A08, corruption #7B4FC8 flaring then fading, fragments #1A2A0A -->
  <!-- Phaser frame strip: frame 0 x=0, frame 1 x=32, frame 2 x=64 -->

  <!-- Frame 0: Cracking — trunk fissuring, corruption light flaring before collapse -->
  <g transform="translate(0,0)">
    <!-- Root anchors pulling loose -->
    <rect x="6"  y="29" width="4"  height="3" rx="1" fill="#1A0E04" opacity="0.8"/>
    <rect x="22" y="29" width="4"  height="3" rx="1" fill="#1A0E04" opacity="0.8"/>
    <!-- Leg stumps cracking -->
    <rect x="8"  y="22" width="6"  height="8" rx="1" fill="#1C1004"/>
    <rect x="18" y="22" width="6"  height="8" rx="1" fill="#1C1004"/>
    <!-- Crack lines on legs -->
    <line x1="11" y1="22" x2="10" y2="30" stroke="#7B4FC8" stroke-width="1" opacity="0.7"/>
    <line x1="21" y1="22" x2="22" y2="30" stroke="#7B4FC8" stroke-width="1" opacity="0.7"/>
    <!-- Trunk body — cracking -->
    <rect x="9"  y="8"  width="14" height="16" rx="2" fill="#1C1004"/>
    <!-- Cracks widening, corruption light blazing out -->
    <rect x="11" y="10" width="2"  height="12" fill="#BB8FFF" opacity="0.9"/>
    <rect x="20" y="12" width="2"  height="8"  fill="#BB8FFF" opacity="0.8"/>
    <rect x="14" y="9"  width="2"  height="14" fill="#9B6FE8" opacity="0.7"/>
    <!-- Large crack across mid trunk -->
    <rect x="9"  y="14" width="14" height="2"  fill="#7B4FC8" opacity="0.6"/>
    <!-- Bark plates -->
    <rect x="9"  y="10" width="14" height="3"  fill="#2B1A08" opacity="0.7"/>
    <rect x="9"  y="18" width="14" height="3"  fill="#2B1A08" opacity="0.6"/>
    <!-- Arms drooping — losing strength -->
    <rect x="1"  y="15" width="9"  height="4"  rx="1" fill="#1C1004"/>
    <rect x="0"  y="13" width="3"  height="3"  fill="#1A2A0A" opacity="0.8"/>
    <rect x="0"  y="18" width="3"  height="3"  fill="#1A2A0A" opacity="0.8"/>
    <rect x="22" y="15" width="9"  height="4"  rx="1" fill="#1C1004"/>
    <rect x="29" y="13" width="3"  height="3"  fill="#1A2A0A" opacity="0.8"/>
    <rect x="29" y="18" width="3"  height="3"  fill="#1A2A0A" opacity="0.8"/>
    <!-- Head cracking -->
    <rect x="10" y="2"  width="12" height="8"  rx="2" fill="#1C1004"/>
    <!-- Eyes flaring wide as death begins -->
    <rect x="12" y="4"  width="3"  height="3"  fill="#BB8FFF"/>
    <rect x="18" y="4"  width="3"  height="3"  fill="#BB8FFF"/>
    <!-- Crack through head -->
    <line x1="16" y1="2" x2="16" y2="10" stroke="#9B6FE8" stroke-width="1" opacity="0.8"/>
    <!-- Mouth gaping -->
    <rect x="11" y="8"  width="10" height="2"  fill="#0A0604"/>
    <!-- Blight wisps escaping cracks -->
    <circle cx="14" cy="12" r="1" fill="#9B6FE8" opacity="0.6"/>
    <circle cx="19" cy="16" r="1" fill="#7B4FC8" opacity="0.5"/>
  </g>

  <!-- Frame 1: Shattering — upper body breaking apart, bark fragments flying -->
  <g transform="translate(32,0)">
    <!-- Bark fragments scattered -->
    <rect x="0"  y="3"  width="4"  height="3"  rx="1" fill="#2B1A08" opacity="0.9" transform="rotate(-20,2,4)"/>
    <rect x="28" y="2"  width="4"  height="3"  rx="1" fill="#1C1004" opacity="0.9" transform="rotate(25,30,3)"/>
    <rect x="2"  y="10" width="3"  height="3"  rx="1" fill="#1A2A0A" opacity="0.8" transform="rotate(15,3,11)"/>
    <rect x="27" y="8"  width="3"  height="3"  rx="1" fill="#1A2A0A" opacity="0.8" transform="rotate(-10,28,9)"/>
    <rect x="14" y="0"  width="4"  height="3"  rx="1" fill="#2B1A08" opacity="0.85"/>
    <rect x="19" y="4"  width="3"  height="2"  rx="1" fill="#1C1004" opacity="0.8" transform="rotate(30,20,5)"/>
    <!-- Corruption energy bursting out -->
    <circle cx="16" cy="10" r="6" fill="#7B4FC8" opacity="0.25"/>
    <line x1="16" y1="10" x2="4"  y2="2"  stroke="#9B6FE8" stroke-width="1" opacity="0.6"/>
    <line x1="16" y1="10" x2="28" y2="2"  stroke="#9B6FE8" stroke-width="1" opacity="0.6"/>
    <line x1="16" y1="10" x2="2"  y2="16" stroke="#7B4FC8" stroke-width="1" opacity="0.5"/>
    <line x1="16" y1="10" x2="30" y2="16" stroke="#7B4FC8" stroke-width="1" opacity="0.5"/>
    <!-- Lower trunk — still intact but crumbling -->
    <rect x="10" y="16" width="12" height="8"  rx="2" fill="#1C1004" opacity="0.9"/>
    <rect x="11" y="17" width="2"  height="6"  fill="#9B6FE8" opacity="0.5"/>
    <rect x="18" y="18" width="2"  height="5"  fill="#9B6FE8" opacity="0.45"/>
    <!-- Leg stumps crumbling -->
    <rect x="8"  y="23" width="5"  height="7"  rx="1" fill="#1C1004" opacity="0.7"/>
    <rect x="19" y="23" width="5"  height="7"  rx="1" fill="#1C1004" opacity="0.7"/>
    <!-- Root remnants separating -->
    <rect x="6"  y="29" width="4"  height="3"  rx="1" fill="#1A0E04" opacity="0.6"/>
    <rect x="22" y="29" width="4"  height="3"  rx="1" fill="#1A0E04" opacity="0.6"/>
    <!-- Bark plates on lower half -->
    <rect x="10" y="17" width="12" height="3"  fill="#2B1A08" opacity="0.6"/>
    <!-- Upper head fragment floating -->
    <rect x="12" y="5"  width="8"  height="5"  rx="2" fill="#1C1004" opacity="0.7" transform="rotate(10,16,7)"/>
    <rect x="13" y="6"  width="2"  height="2"  fill="#9B6FE8" opacity="0.7" transform="rotate(10,16,7)"/>
    <rect x="18" y="6"  width="2"  height="2"  fill="#9B6FE8" opacity="0.6" transform="rotate(10,16,7)"/>
    <!-- Blight energy cloud at shatter point -->
    <ellipse cx="16" cy="12" rx="5" ry="4" fill="#5A3A80" opacity="0.3"/>
  </g>

  <!-- Frame 2: Collapsed — pile of blighted bark, corruption wisps dispersing -->
  <g transform="translate(64,0)">
    <!-- Ground debris pile -->
    <!-- Bark chunks scattered on ground -->
    <rect x="3"  y="22" width="5"  height="4"  rx="1" fill="#2B1A08" opacity="0.85" transform="rotate(-15,5,24)"/>
    <rect x="24" y="21" width="5"  height="4"  rx="1" fill="#1C1004" opacity="0.85" transform="rotate(20,26,23)"/>
    <rect x="11" y="24" width="6"  height="4"  rx="2" fill="#2B1A08" opacity="0.9"/>
    <rect x="18" y="25" width="5"  height="4"  rx="1" fill="#1C1004" opacity="0.8" transform="rotate(10,20,27)"/>
    <rect x="7"  y="26" width="4"  height="3"  rx="1" fill="#1A2A0A" opacity="0.75" transform="rotate(-8,9,27)"/>
    <rect x="21" y="27" width="4"  height="3"  rx="1" fill="#1A2A0A" opacity="0.7" transform="rotate(12,23,28)"/>
    <!-- Log/trunk remnant -->
    <rect x="8"  y="26" width="16" height="5"  rx="2" fill="#1C1004" opacity="0.9"/>
    <rect x="10" y="27" width="3"  height="3"  fill="#2B1A08" opacity="0.7"/>
    <rect x="19" y="27" width="3"  height="3"  fill="#2B1A08" opacity="0.7"/>
    <!-- Faint blight glow in the debris — corruption draining away -->
    <rect x="12" y="27" width="2"  height="3"  fill="#5A3A80" opacity="0.4"/>
    <rect x="17" y="28" width="2"  height="2"  fill="#5A3A80" opacity="0.35"/>
    <!-- Root stumps flat -->
    <rect x="4"  y="29" width="5"  height="3"  rx="1" fill="#1A0E04" opacity="0.8"/>
    <rect x="23" y="29" width="5"  height="3"  rx="1" fill="#1A0E04" opacity="0.8"/>
    <!-- Dispersing blight wisps floating upward -->
    <circle cx="10" cy="17" r="1.5" fill="#7B4FC8" opacity="0.4"/>
    <circle cx="22" cy="14" r="1"   fill="#7B4FC8" opacity="0.35"/>
    <circle cx="16" cy="12" r="1.5" fill="#9B6FE8" opacity="0.3"/>
    <circle cx="14" cy="8"  r="1"   fill="#7B4FC8" opacity="0.2"/>
    <circle cx="20" cy="7"  r="1"   fill="#5A3A80" opacity="0.2"/>
    <!-- Eye fragment on ground — very faint -->
    <rect x="14" y="28" width="2"  height="2"  fill="#3A1A50" opacity="0.5"/>
  </g>
</svg>
