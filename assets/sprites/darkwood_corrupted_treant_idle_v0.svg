<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Corrupted Treant Sprout Idle Frame">
  <!-- Corrupted Treant Sprout (E-3) — level 6-9 — idle frame, 32x32 -->
  <!-- Ground root anchors -->
  <rect x="6"  y="28" width="5"  height="4"  rx="1" fill="#1A0E04"/>
  <rect x="21" y="28" width="5"  height="4"  rx="1" fill="#1A0E04"/>
  <rect x="13" y="30" width="6"  height="2"  rx="1" fill="#1A0E04"/>
  <!-- Legs/trunk base — thick stumpy -->
  <rect x="8"  y="22" width="6"  height="10" rx="1" fill="#1C1004"/>
  <rect x="18" y="22" width="6"  height="10" rx="1" fill="#1C1004"/>
  <!-- Main trunk body — blackened corrupted bark -->
  <rect x="9"  y="8"  width="14" height="16" rx="2" fill="#1C1004"/>
  <!-- Bark highlight — corruption fissures glowing purple -->
  <rect x="11" y="10" width="2"  height="12" fill="#7B4FC8" opacity="0.35"/>
  <rect x="20" y="12" width="1"  height="8"  fill="#7B4FC8" opacity="0.3"/>
  <rect x="14" y="9"  width="1"  height="14" fill="#5A3A80" opacity="0.25"/>
  <!-- Bark texture plates -->
  <rect x="9"  y="10" width="14" height="3"  fill="#2B1A08" opacity="0.8"/>
  <rect x="9"  y="17" width="14" height="3"  fill="#2B1A08" opacity="0.7"/>
  <!-- Razor-edged leaf clusters on arms/shoulders — dark with sharp tips -->
  <!-- Left arm -->
  <rect x="1"  y="12" width="9"  height="5"  rx="1" fill="#1C1004"/>
  <rect x="0"  y="10" width="3"  height="3"  fill="#1A2A0A"/>
  <rect x="0"  y="16" width="3"  height="3"  fill="#1A2A0A"/>
  <rect x="3"  y="9"  width="3"  height="3"  fill="#1A2A0A"/>
  <!-- Right arm -->
  <rect x="22" y="12" width="9"  height="5"  rx="1" fill="#1C1004"/>
  <rect x="29" y="10" width="3"  height="3"  fill="#1A2A0A"/>
  <rect x="29" y="16" width="3"  height="3"  fill="#1A2A0A"/>
  <rect x="26" y="9"  width="3"  height="3"  fill="#1A2A0A"/>
  <!-- Head — knobby tree-top, hollow eye sockets -->
  <rect x="10" y="2"  width="12" height="8"  rx="2" fill="#1C1004"/>
  <!-- Hollow eye sockets — glowing purple corruption within -->
  <rect x="12" y="4"  width="3"  height="3"  fill="#7B4FC8" opacity="0.8"/>
  <rect x="18" y="4"  width="3"  height="3"  fill="#7B4FC8" opacity="0.8"/>
  <!-- Dark eye caps — sunken look -->
  <rect x="12" y="4"  width="3"  height="1"  fill="#0A0604"/>
  <rect x="18" y="4"  width="3"  height="1"  fill="#0A0604"/>
  <!-- Mouth — ragged gash -->
  <rect x="12" y="8"  width="8"  height="2"  fill="#0A0604"/>
</svg>
