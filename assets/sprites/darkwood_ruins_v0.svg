<svg xmlns="http://www.w3.org/2000/svg" width="32" height="24" viewBox="0 0 32 24" role="img" aria-label="Darkwood Ruins Prop">
  <!-- Collapsed stone wall segment — 32x24 short prop -->
  <!-- Base rubble shadow -->
  <ellipse cx="16" cy="23" rx="14" ry="2" fill="#0F0C05" opacity="0.4"/>
  <!-- Stone blocks — staggered rubble pile -->
  <rect x="0"  y="12" width="12" height="8"  fill="#2A2A2A"/>
  <rect x="10" y="10" width="10" height="10" fill="#3A3A3A"/>
  <rect x="18" y="14" width="10" height="8"  fill="#2A2A2A"/>
  <rect x="4"  y="6"  width="9"  height="8"  fill="#3A3A3A"/>
  <rect x="16" y="8"  width="8"  height="8"  fill="#2A2A2A"/>
  <!-- Mortar lines -->
  <rect x="0"  y="18" width="12" height="1" fill="#1A1A1A"/>
  <rect x="10" y="16" width="10" height="1" fill="#1A1A1A"/>
  <rect x="18" y="19" width="10" height="1" fill="#1A1A1A"/>
  <rect x="4"  y="11" width="9"  height="1" fill="#1A1A1A"/>
  <!-- Arcane glyph on top stone -->
  <rect x="20" y="9"  width="4"  height="1" fill="#7B4FC8" opacity="0.6"/>
  <rect x="21" y="7"  width="2"  height="5" fill="#7B4FC8" opacity="0.6"/>
  <!-- Vine accents -->
  <rect x="2"  y="10" width="1"  height="6" fill="#1A2A0E" opacity="0.75"/>
  <rect x="28" y="13" width="1"  height="5" fill="#1A2A0E" opacity="0.7"/>
</svg>
