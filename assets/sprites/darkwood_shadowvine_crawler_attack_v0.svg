<svg xmlns="http://www.w3.org/2000/svg" width="96" height="32" viewBox="0 0 96 32" role="img" aria-label="Shadowvine Crawler Attack Animation — 3 frames">
  <!-- E-4 Shadowvine Crawler — attack animation, 3×32x32 sprite sheet -->
  <!-- Palette: vines #1A1A08/#2A2A0E, blight #5A3A80/#7B4FC8, eyes #7B4FC8/#9B6FE8 -->
  <!-- Attack style: tendrils coil inward then explode outward as ensnare strike -->
  <!-- Phaser frame strip: frame 0 x=0, frame 1 x=32, frame 2 x=64 -->

  <!-- Frame 0: Coiling — tendrils pulling inward, core condensing and brightening -->
  <g transform="translate(0,0)">
    <!-- Outer tendrils retracting — shorter reach than idle -->
    <line x1="16" y1="16" x2="5"  y2="7"  stroke="#1A1A08" stroke-width="1.5" opacity="0.8"/>
    <line x1="16" y1="16" x2="27" y2="7"  stroke="#1A1A08" stroke-width="1.5" opacity="0.8"/>
    <line x1="16" y1="16" x2="4"  y2="16" stroke="#1A1A08" stroke-width="1.5" opacity="0.75"/>
    <line x1="16" y1="16" x2="28" y2="16" stroke="#1A1A08" stroke-width="1.5" opacity="0.75"/>
    <line x1="16" y1="16" x2="5"  y2="25" stroke="#1A1A08" stroke-width="1.5" opacity="0.8"/>
    <line x1="16" y1="16" x2="27" y2="25" stroke="#1A1A08" stroke-width="1.5" opacity="0.8"/>
    <!-- Vine tips curling back -->
    <circle cx="5"  cy="7"  r="1.5" fill="#1A2A0A" opacity="0.8"/>
    <circle cx="27" cy="7"  r="1.5" fill="#1A2A0A" opacity="0.8"/>
    <circle cx="4"  cy="16" r="1.5" fill="#1A2A0A" opacity="0.75"/>
    <circle cx="28" cy="16" r="1.5" fill="#1A2A0A" opacity="0.75"/>
    <circle cx="5"  cy="25" r="1.5" fill="#1A2A0A" opacity="0.8"/>
    <circle cx="27" cy="25" r="1.5" fill="#1A2A0A" opacity="0.8"/>
    <!-- Mid vine loops tightening -->
    <ellipse cx="16" cy="16" rx="8" ry="6" fill="none" stroke="#2A2A0E" stroke-width="2" opacity="0.8"/>
    <ellipse cx="15" cy="15" rx="5" ry="4" fill="none" stroke="#1A1A08" stroke-width="1.5" opacity="0.9" transform="rotate(20,15,15)"/>
    <!-- Core — denser, brighter as energy builds -->
    <ellipse cx="16" cy="16" rx="7"  ry="6"  fill="#1A1A08"/>
    <ellipse cx="16" cy="16" rx="5"  ry="4"  fill="#2A2A10"/>
    <!-- Blight threads condensing -->
    <rect x="12" y="14" width="8" height="1" fill="#7B4FC8" opacity="0.7"/>
    <rect x="13" y="16" width="6" height="1" fill="#7B4FC8" opacity="0.65"/>
    <rect x="15" y="12" width="1" height="7" fill="#7B4FC8" opacity="0.6"/>
    <!-- Eyes brightening -->
    <circle cx="14" cy="15" r="1.5" fill="#9B6FE8" opacity="1"/>
    <circle cx="18" cy="15" r="1.5" fill="#9B6FE8" opacity="1"/>
    <circle cx="16" cy="18" r="1.5" fill="#BB8FFF" opacity="0.9"/>
  </g>

  <!-- Frame 1: Explosion — tendrils lashing outward at full extension, thorn tips striking -->
  <g transform="translate(32,0)">
    <!-- Tendrils at max extension — aggressive angle, reaching all edges -->
    <line x1="16" y1="16" x2="0"  y2="2"  stroke="#2A2A10" stroke-width="2"   opacity="0.95"/>
    <line x1="16" y1="16" x2="32" y2="2"  stroke="#2A2A10" stroke-width="2"   opacity="0.95"/>
    <line x1="16" y1="16" x2="0"  y2="16" stroke="#2A2A10" stroke-width="2.5" opacity="0.95"/>
    <line x1="16" y1="16" x2="32" y2="16" stroke="#2A2A10" stroke-width="2.5" opacity="0.95"/>
    <line x1="16" y1="16" x2="0"  y2="30" stroke="#2A2A10" stroke-width="2"   opacity="0.95"/>
    <line x1="16" y1="16" x2="32" y2="30" stroke="#2A2A10" stroke-width="2"   opacity="0.95"/>
    <!-- Secondary lash lines -->
    <line x1="16" y1="16" x2="6"  y2="0"  stroke="#1A1A08" stroke-width="1.5" opacity="0.8"/>
    <line x1="16" y1="16" x2="26" y2="0"  stroke="#1A1A08" stroke-width="1.5" opacity="0.8"/>
    <line x1="16" y1="16" x2="0"  y2="8"  stroke="#1A1A08" stroke-width="1.5" opacity="0.75"/>
    <line x1="16" y1="16" x2="32" y2="8"  stroke="#1A1A08" stroke-width="1.5" opacity="0.75"/>
    <line x1="16" y1="16" x2="0"  y2="24" stroke="#1A1A08" stroke-width="1.5" opacity="0.75"/>
    <line x1="16" y1="16" x2="32" y2="24" stroke="#1A1A08" stroke-width="1.5" opacity="0.75"/>
    <!-- Thorn tip impacts — sharp nodes at tendril ends -->
    <circle cx="0"  cy="2"  r="2" fill="#3A2A0A"/>
    <circle cx="32" cy="2"  r="2" fill="#3A2A0A"/>
    <circle cx="0"  cy="16" r="2" fill="#3A2A0A"/>
    <circle cx="32" cy="16" r="2" fill="#3A2A0A"/>
    <circle cx="0"  cy="30" r="2" fill="#3A2A0A"/>
    <circle cx="32" cy="30" r="2" fill="#3A2A0A"/>
    <!-- Blight ripple from core -->
    <ellipse cx="16" cy="16" rx="9" ry="7" fill="none" stroke="#7B4FC8" stroke-width="1" opacity="0.5"/>
    <!-- Core — still present at center -->
    <ellipse cx="16" cy="16" rx="5" ry="4" fill="#1A1A08"/>
    <ellipse cx="16" cy="16" rx="3" ry="2.5" fill="#2A2A10"/>
    <rect x="14" y="15" width="4" height="1" fill="#9B6FE8" opacity="0.8"/>
    <rect x="15" y="14" width="1" height="4" fill="#9B6FE8" opacity="0.7"/>
    <!-- Eyes at peak brightness -->
    <circle cx="14" cy="15" r="2" fill="#BB8FFF"/>
    <circle cx="18" cy="15" r="2" fill="#BB8FFF"/>
    <circle cx="16" cy="18" r="1.5" fill="#DD99FF"/>
  </g>

  <!-- Frame 2: Retracting — tendrils pulling back in, core settling -->
  <g transform="translate(64,0)">
    <!-- Tendrils at medium extension, pulling back -->
    <line x1="16" y1="16" x2="3"  y2="5"  stroke="#1A1A08" stroke-width="1.5" opacity="0.85"/>
    <line x1="16" y1="16" x2="29" y2="5"  stroke="#1A1A08" stroke-width="1.5" opacity="0.85"/>
    <line x1="16" y1="16" x2="2"  y2="16" stroke="#1A1A08" stroke-width="1.5" opacity="0.8"/>
    <line x1="16" y1="16" x2="30" y2="16" stroke="#1A1A08" stroke-width="1.5" opacity="0.8"/>
    <line x1="16" y1="16" x2="3"  y2="27" stroke="#1A1A08" stroke-width="1.5" opacity="0.85"/>
    <line x1="16" y1="16" x2="29" y2="27" stroke="#1A1A08" stroke-width="1.5" opacity="0.85"/>
    <!-- Secondary tendrils -->
    <line x1="16" y1="16" x2="9"  y2="2"  stroke="#1A1A08" stroke-width="1"   opacity="0.6"/>
    <line x1="16" y1="16" x2="23" y2="2"  stroke="#1A1A08" stroke-width="1"   opacity="0.6"/>
    <line x1="16" y1="16" x2="3"  y2="10" stroke="#1A1A08" stroke-width="1"   opacity="0.6"/>
    <line x1="16" y1="16" x2="29" y2="10" stroke="#1A1A08" stroke-width="1"   opacity="0.6"/>
    <line x1="16" y1="16" x2="3"  y2="22" stroke="#1A1A08" stroke-width="1"   opacity="0.6"/>
    <line x1="16" y1="16" x2="29" y2="22" stroke="#1A1A08" stroke-width="1"   opacity="0.6"/>
    <!-- Vine tips with thorn nodes -->
    <circle cx="3"  cy="5"  r="1.5" fill="#1A2A0A"/>
    <circle cx="29" cy="5"  r="1.5" fill="#1A2A0A"/>
    <circle cx="2"  cy="16" r="1.5" fill="#1A2A0A"/>
    <circle cx="30" cy="16" r="1.5" fill="#1A2A0A"/>
    <!-- Mid loops returning -->
    <ellipse cx="16" cy="16" rx="9"  ry="7"  fill="none" stroke="#2A2A0E" stroke-width="2"   opacity="0.7"/>
    <ellipse cx="15" cy="15" rx="6"  ry="5"  fill="none" stroke="#1A1A08" stroke-width="1.5" opacity="0.75" transform="rotate(20,15,15)"/>
    <!-- Core settling back -->
    <ellipse cx="16" cy="16" rx="6"  ry="5"  fill="#1A1A08"/>
    <ellipse cx="16" cy="16" rx="4"  ry="3.5" fill="#2A2A10"/>
    <rect x="13" y="14" width="6" height="1" fill="#5A3A80" opacity="0.6"/>
    <rect x="14" y="16" width="4" height="1" fill="#5A3A80" opacity="0.5"/>
    <rect x="15" y="13" width="1" height="6" fill="#5A3A80" opacity="0.45"/>
    <!-- Eyes returning to normal glow -->
    <circle cx="14" cy="15" r="1.5" fill="#7B4FC8" opacity="0.9"/>
    <circle cx="18" cy="15" r="1.5" fill="#7B4FC8" opacity="0.9"/>
    <circle cx="16" cy="18" r="1"   fill="#9B6FE8" opacity="0.75"/>
  </g>
</svg>
