<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Shadowvine Crawler Idle Frame">
  <!-- Shadowvine Crawler (E-4) — level 8-11 — idle frame, 32x32 -->
  <!-- The Crawler is a mass of animated dark vines with collective consciousness -->
  <!-- Outer vine tendrils radiating outward -->
  <line x1="16" y1="16" x2="2"  y2="4"  stroke="#1A1A08" stroke-width="1.5" opacity="0.9"/>
  <line x1="16" y1="16" x2="30" y2="4"  stroke="#1A1A08" stroke-width="1.5" opacity="0.9"/>
  <line x1="16" y1="16" x2="0"  y2="16" stroke="#1A1A08" stroke-width="1.5" opacity="0.85"/>
  <line x1="16" y1="16" x2="32" y2="16" stroke="#1A1A08" stroke-width="1.5" opacity="0.85"/>
  <line x1="16" y1="16" x2="2"  y2="28" stroke="#1A1A08" stroke-width="1.5" opacity="0.9"/>
  <line x1="16" y1="16" x2="30" y2="28" stroke="#1A1A08" stroke-width="1.5" opacity="0.9"/>
  <line x1="16" y1="16" x2="8"  y2="1"  stroke="#1A1A08" stroke-width="1"   opacity="0.7"/>
  <line x1="16" y1="16" x2="24" y2="1"  stroke="#1A1A08" stroke-width="1"   opacity="0.7"/>
  <line x1="16" y1="16" x2="1"  y2="8"  stroke="#1A1A08" stroke-width="1"   opacity="0.7"/>
  <line x1="16" y1="16" x2="31" y2="8"  stroke="#1A1A08" stroke-width="1"   opacity="0.7"/>
  <line x1="16" y1="16" x2="1"  y2="24" stroke="#1A1A08" stroke-width="1"   opacity="0.7"/>
  <line x1="16" y1="16" x2="31" y2="24" stroke="#1A1A08" stroke-width="1"   opacity="0.7"/>
  <!-- Mid-layer vine loops — gives the tangled-mass look -->
  <ellipse cx="16" cy="16" rx="10" ry="8"  fill="none" stroke="#2A2A0E" stroke-width="2" opacity="0.7"/>
  <ellipse cx="14" cy="14" rx="6"  ry="5"  fill="none" stroke="#1A1A08" stroke-width="1.5" opacity="0.8" transform="rotate(20 14 14)"/>
  <ellipse cx="18" cy="18" rx="5"  ry="4"  fill="none" stroke="#2A2A0E" stroke-width="1.5" opacity="0.75" transform="rotate(-15 18 18)"/>
  <!-- Central core — denser mass -->
  <ellipse cx="16" cy="16" rx="6"  ry="5"  fill="#1A1A08"/>
  <ellipse cx="16" cy="16" rx="4"  ry="3.5" fill="#2A2A10"/>
  <!-- Blight purple corruption threads through the core -->
  <rect x="13" y="14" width="6"  height="1" fill="#5A3A80" opacity="0.6"/>
  <rect x="14" y="16" width="4"  height="1" fill="#5A3A80" opacity="0.5"/>
  <rect x="15" y="13" width="1"  height="6" fill="#5A3A80" opacity="0.45"/>
  <!-- Collective consciousness — 3 glowing "eyes" in the core -->
  <circle cx="14" cy="15" r="1.5" fill="#7B4FC8" opacity="0.9"/>
  <circle cx="18" cy="15" r="1.5" fill="#7B4FC8" opacity="0.9"/>
  <circle cx="16" cy="18" r="1"   fill="#9B6FE8" opacity="0.75"/>
  <!-- Vine tips — small leaf/thorn nodes at ends of tendrils -->
  <circle cx="2"  cy="4"  r="1.5" fill="#1A2A0A"/>
  <circle cx="30" cy="4"  r="1.5" fill="#1A2A0A"/>
  <circle cx="0"  cy="16" r="1.5" fill="#1A2A0A"/>
  <circle cx="32" cy="16" r="1.5" fill="#1A2A0A"/>
  <circle cx="2"  cy="28" r="1.5" fill="#1A2A0A"/>
  <circle cx="30" cy="28" r="1.5" fill="#1A2A0A"/>
</svg>
