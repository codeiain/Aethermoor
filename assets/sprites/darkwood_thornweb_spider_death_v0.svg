<svg xmlns="http://www.w3.org/2000/svg" width="96" height="32" viewBox="0 0 96 32" role="img" aria-label="Thornweb Spider Death Animation — 3 frames">
  <!-- E-2 Thornweb Spider — death animation, 3×32x32 sprite sheet -->
  <!-- Palette: body #2A1A08/#3A2A12, blight purple #7B4FC8 fading, eyes dimming to black -->
  <!-- Phaser frame strip: frame 0 x=0, frame 1 x=32, frame 2 x=64 -->

  <!-- Frame 0: First hit — body staggering, front legs buckling, eyes flickering -->
  <g transform="translate(0,0)">
    <!-- Web strands going slack -->
    <line x1="16" y1="28" x2="4"  y2="32" stroke="#3A2A10" stroke-width="1" opacity="0.5"/>
    <line x1="16" y1="28" x2="28" y2="32" stroke="#3A2A10" stroke-width="1" opacity="0.5"/>
    <!-- Abdomen — slightly tilted, starting to drop -->
    <ellipse cx="15" cy="22" rx="9" ry="6" fill="#2A1A08"/>
    <ellipse cx="15" cy="22" rx="7" ry="4" fill="#3A2A12"/>
    <rect x="9"  y="20" width="12" height="1" fill="#1A0E04" opacity="0.7"/>
    <rect x="10" y="23" width="10" height="1" fill="#1A0E04" opacity="0.6"/>
    <!-- Blight leaking from wound -->
    <rect x="13" y="19" width="3"  height="7" fill="#4A3860" opacity="0.8"/>
    <circle cx="15" cy="26" r="2" fill="#7B4FC8" opacity="0.5"/>
    <!-- Thorax tilted -->
    <ellipse cx="15" cy="13" rx="5" ry="5" fill="#2A1A08"/>
    <!-- Legs — front two buckling, rear still gripping -->
    <line x1="10" y1="11" x2="3"  y2="8"  stroke="#3A2A12" stroke-width="2" opacity="0.7"/>
    <line x1="10" y1="12" x2="1"  y2="14" stroke="#3A2A12" stroke-width="2" opacity="0.6"/>
    <line x1="10" y1="14" x2="1"  y2="20" stroke="#3A2A12" stroke-width="2"/>
    <line x1="10" y1="15" x2="2"  y2="26" stroke="#3A2A12" stroke-width="2"/>
    <line x1="20" y1="11" x2="29" y2="7"  stroke="#3A2A12" stroke-width="2" opacity="0.7"/>
    <line x1="20" y1="12" x2="31" y2="13" stroke="#3A2A12" stroke-width="2" opacity="0.6"/>
    <line x1="20" y1="14" x2="31" y2="20" stroke="#3A2A12" stroke-width="2"/>
    <line x1="20" y1="15" x2="30" y2="26" stroke="#3A2A12" stroke-width="2"/>
    <!-- Eyes flickering — one bright, one dimmed -->
    <rect x="12" y="10" width="1" height="1" fill="#B04FB0" opacity="0.4"/>
    <rect x="14" y="9"  width="1" height="1" fill="#D06FD0"/>
    <rect x="16" y="9"  width="1" height="1" fill="#B04FB0" opacity="0.3"/>
    <rect x="18" y="10" width="1" height="1" fill="#D06FD0"/>
    <rect x="13" y="12" width="1" height="1" fill="#C84FC8" opacity="0.5"/>
    <rect x="17" y="12" width="1" height="1" fill="#C84FC8" opacity="0.5"/>
    <!-- Fangs going limp -->
    <rect x="13" y="17" width="2" height="3" fill="#3A2A12" opacity="0.8"/>
    <rect x="15" y="17" width="2" height="3" fill="#2A1A08" opacity="0.8"/>
  </g>

  <!-- Frame 1: Collapsing — body on side, legs curling inward -->
  <g transform="translate(32,0)">
    <!-- Spider tipped over, rotated ~50° to the right -->
    <g transform="rotate(50, 16, 20)">
      <!-- Abdomen — tilted -->
      <ellipse cx="16" cy="22" rx="9" ry="6" fill="#2A1A08"/>
      <ellipse cx="16" cy="22" rx="7" ry="4" fill="#3A2A12"/>
      <rect x="10" y="20" width="12" height="1" fill="#1A0E04" opacity="0.7"/>
      <rect x="11" y="23" width="10" height="1" fill="#1A0E04" opacity="0.5"/>
      <!-- Blight leaking more heavily -->
      <rect x="13" y="19" width="4" height="8" fill="#4A3860" opacity="0.7"/>
      <!-- Thorax -->
      <ellipse cx="16" cy="13" rx="5" ry="5" fill="#2A1A08"/>
      <!-- Legs curling inward — all bending toward body -->
      <line x1="11" y1="12" x2="7"  y2="8"  stroke="#3A2A12" stroke-width="2"/>
      <line x1="11" y1="13" x2="6"  y2="14" stroke="#3A2A12" stroke-width="2"/>
      <line x1="11" y1="14" x2="7"  y2="18" stroke="#3A2A12" stroke-width="2"/>
      <line x1="11" y1="15" x2="8"  y2="20" stroke="#3A2A12" stroke-width="2"/>
      <line x1="21" y1="12" x2="25" y2="8"  stroke="#3A2A12" stroke-width="2"/>
      <line x1="21" y1="13" x2="26" y2="14" stroke="#3A2A12" stroke-width="2"/>
      <line x1="21" y1="14" x2="25" y2="18" stroke="#3A2A12" stroke-width="2"/>
      <line x1="21" y1="15" x2="24" y2="20" stroke="#3A2A12" stroke-width="2"/>
      <!-- Eyes dimming — very faint -->
      <rect x="13" y="10" width="1" height="1" fill="#703070" opacity="0.5"/>
      <rect x="15" y="9"  width="1" height="1" fill="#703070" opacity="0.4"/>
      <rect x="17" y="9"  width="1" height="1" fill="#703070" opacity="0.3"/>
      <rect x="19" y="10" width="1" height="1" fill="#703070" opacity="0.4"/>
      <!-- Fangs limp -->
      <rect x="14" y="17" width="2" height="2" fill="#3A2A12" opacity="0.6"/>
      <rect x="16" y="17" width="2" height="2" fill="#2A1A08" opacity="0.6"/>
    </g>
    <!-- Blight residue on ground -->
    <ellipse cx="18" cy="30" rx="6" ry="2" fill="#4A2860" opacity="0.4"/>
  </g>

  <!-- Frame 2: Dead — fully inverted, all legs curled, blight fading -->
  <g transform="translate(64,0)">
    <!-- Upturned body — legs all curled inward above -->
    <!-- Abdomen upside down at bottom -->
    <ellipse cx="16" cy="26" rx="9" ry="5" fill="#1A0E04"/>
    <ellipse cx="16" cy="26" rx="7" ry="3" fill="#2A1504"/>
    <!-- Thorax above it (inverted) -->
    <ellipse cx="16" cy="18" rx="5" ry="4" fill="#1A0E04"/>
    <!-- All 8 legs curled up tightly toward center -->
    <line x1="11" y1="20" x2="7"  y2="14" stroke="#2A1A08" stroke-width="1.5"/>
    <line x1="11" y1="21" x2="6"  y2="18" stroke="#2A1A08" stroke-width="1.5"/>
    <line x1="12" y1="23" x2="8"  y2="22" stroke="#2A1A08" stroke-width="1.5"/>
    <line x1="13" y1="25" x2="9"  y2="26" stroke="#2A1A08" stroke-width="1.5"/>
    <line x1="21" y1="20" x2="25" y2="14" stroke="#2A1A08" stroke-width="1.5"/>
    <line x1="21" y1="21" x2="26" y2="18" stroke="#2A1A08" stroke-width="1.5"/>
    <line x1="20" y1="23" x2="24" y2="22" stroke="#2A1A08" stroke-width="1.5"/>
    <line x1="19" y1="25" x2="23" y2="26" stroke="#2A1A08" stroke-width="1.5"/>
    <!-- Eyes — fully dark, just faint ghost traces -->
    <rect x="13" y="15" width="1" height="1" fill="#3A1A3A" opacity="0.4"/>
    <rect x="15" y="14" width="1" height="1" fill="#3A1A3A" opacity="0.3"/>
    <rect x="17" y="14" width="1" height="1" fill="#3A1A3A" opacity="0.3"/>
    <rect x="19" y="15" width="1" height="1" fill="#3A1A3A" opacity="0.4"/>
    <!-- Blight residue pooling on ground -->
    <ellipse cx="16" cy="31" rx="8"  ry="2"   fill="#3A1A50" opacity="0.5"/>
    <ellipse cx="16" cy="31" rx="4"  ry="1.5" fill="#5A2A70" opacity="0.35"/>
  </g>
</svg>
