<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Thornweb Spider Idle Frame">
  <!-- Thornweb Spider (E-2) — level 7-10 — idle frame, 32x32 -->
  <!-- Petrified vine web strands beneath spider -->
  <line x1="16" y1="28" x2="4"  y2="32" stroke="#3A2A10" stroke-width="1" opacity="0.7"/>
  <line x1="16" y1="28" x2="28" y2="32" stroke="#3A2A10" stroke-width="1" opacity="0.7"/>
  <line x1="16" y1="28" x2="16" y2="32" stroke="#3A2A10" stroke-width="1" opacity="0.6"/>
  <!-- Blight-tinged web glow on strands -->
  <line x1="16" y1="28" x2="4"  y2="32" stroke="#5A3A18" stroke-width="0.5" opacity="0.4"/>
  <!-- Abdomen — larger, petrified vine texture -->
  <ellipse cx="16" cy="22" rx="9"  ry="7"  fill="#2A1A08"/>
  <ellipse cx="16" cy="22" rx="7"  ry="5"  fill="#3A2A12"/>
  <!-- Vine-bark texture on abdomen -->
  <rect x="10" y="20" width="12" height="1" fill="#1A0E04" opacity="0.7"/>
  <rect x="11" y="23" width="10" height="1" fill="#1A0E04" opacity="0.6"/>
  <!-- Blight discolouration streaks on abdomen -->
  <rect x="14" y="19" width="2"  height="6" fill="#4A3860" opacity="0.5"/>
  <!-- Thorax -->
  <ellipse cx="16" cy="13" rx="5"  ry="5"  fill="#2A1A08"/>
  <!-- Legs — 4 per side, petrified vine appearance (slightly thicker) -->
  <line x1="11" y1="12" x2="1"  y2="7"  stroke="#3A2A12" stroke-width="2"/>
  <line x1="11" y1="13" x2="0"  y2="13" stroke="#3A2A12" stroke-width="2"/>
  <line x1="11" y1="14" x2="1"  y2="20" stroke="#3A2A12" stroke-width="2"/>
  <line x1="11" y1="15" x2="2"  y2="25" stroke="#3A2A12" stroke-width="2"/>
  <line x1="21" y1="12" x2="31" y2="7"  stroke="#3A2A12" stroke-width="2"/>
  <line x1="21" y1="13" x2="32" y2="13" stroke="#3A2A12" stroke-width="2"/>
  <line x1="21" y1="14" x2="31" y2="20" stroke="#3A2A12" stroke-width="2"/>
  <line x1="21" y1="15" x2="30" y2="25" stroke="#3A2A12" stroke-width="2"/>
  <!-- Eyes — 6 Blight-tinged red/purple -->
  <rect x="13" y="10" width="1" height="1" fill="#B04FB0"/>
  <rect x="15" y="9"  width="1" height="1" fill="#B04FB0"/>
  <rect x="17" y="9"  width="1" height="1" fill="#B04FB0"/>
  <rect x="19" y="10" width="1" height="1" fill="#B04FB0"/>
  <rect x="14" y="12" width="1" height="1" fill="#C84FC8" opacity="0.8"/>
  <rect x="18" y="12" width="1" height="1" fill="#C84FC8" opacity="0.8"/>
  <!-- Fangs with Blight tinge -->
  <rect x="14" y="17" width="2" height="3" fill="#3A2A12"/>
  <rect x="16" y="17" width="2" height="3" fill="#2A1A08"/>
  <!-- Egg sac hint on abdomen underside -->
  <ellipse cx="16" cy="27" rx="3" ry="2" fill="#1A0E04" opacity="0.8"/>
</svg>
