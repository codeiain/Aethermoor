<svg xmlns="http://www.w3.org/2000/svg" width="96" height="32" viewBox="0 0 96 32" role="img" aria-label="Darkwood Wraith Attack Animation — 3 frames">
  <!-- E-5 Darkwood Wraith — attack animation, 3×32x32 sprite sheet -->
  <!-- Palette: robe #2A1A4A/#1A1030, sigil #7B4FC8, eye glow #C8A0FF, energy beam #BB8FFF -->
  <!-- Attack: channels dark energy then releases necrotic bolt from outstretched arms -->
  <!-- Phaser frame strip: frame 0 x=0, frame 1 x=32, frame 2 x=64 -->

  <!-- Frame 0: Channelling — arms extending outward, sigil blazing, robe swirling -->
  <g transform="translate(0,0)">
    <!-- Wispy robe hem — animated/swirling -->
    <ellipse cx="16" cy="30" rx="11" ry="3" fill="#2A1A4A" opacity="0.35"/>
    <ellipse cx="16" cy="28" rx="9"  ry="4" fill="#2A1A4A" opacity="0.55"/>
    <!-- Lower robe — swirling, offset slightly -->
    <rect x="9"  y="17" width="14" height="13" rx="5" fill="#2A1A4A" opacity="0.85"/>
    <!-- Upper torso -->
    <rect x="11" y="7"  width="10" height="12" rx="2" fill="#2A1A4A"/>
    <!-- Cloak wings spreading wide for channel pose -->
    <rect x="2"  y="8"  width="10" height="9"  rx="2" fill="#1A1030" opacity="0.9" transform="rotate(-25,7,12)"/>
    <rect x="20" y="8"  width="10" height="9"  rx="2" fill="#1A1030" opacity="0.9" transform="rotate(25,25,12)"/>
    <!-- Arms outstretched — hands/sleeves extended -->
    <rect x="1"  y="14" width="10" height="4"  rx="2" fill="#2A1A4A"/>
    <rect x="21" y="14" width="10" height="4"  rx="2" fill="#2A1A4A"/>
    <!-- Energy gathering at palms -->
    <circle cx="2"  cy="16" r="2.5" fill="#7B4FC8" opacity="0.7"/>
    <circle cx="30" cy="16" r="2.5" fill="#7B4FC8" opacity="0.7"/>
    <!-- Sigil on chest — blazing bright during channel -->
    <rect x="13" y="12" width="6"  height="1"  fill="#BB8FFF"/>
    <rect x="15" y="10" width="2"  height="5"  fill="#BB8FFF"/>
    <rect x="13" y="14" width="6"  height="1"  fill="#9B6FE8" opacity="0.7"/>
    <!-- Head / hood -->
    <ellipse cx="16" cy="5" rx="6" ry="5" fill="#1A1030"/>
    <!-- Eye sockets — blazing during channel -->
    <rect x="11" y="4"  width="3"  height="2"  fill="#DD99FF"/>
    <rect x="17" y="4"  width="3"  height="2"  fill="#DD99FF"/>
    <!-- Arcane particles swirling in -->
    <circle cx="8"  cy="10" r="1"   fill="#7B4FC8" opacity="0.6"/>
    <circle cx="24" cy="10" r="1"   fill="#7B4FC8" opacity="0.6"/>
    <circle cx="10" cy="5"  r="0.8" fill="#9B6FE8" opacity="0.5"/>
    <circle cx="22" cy="5"  r="0.8" fill="#9B6FE8" opacity="0.5"/>
  </g>

  <!-- Frame 1: Release — dark energy bolt fired, form recoiling -->
  <g transform="translate(32,0)">
    <!-- Energy bolt / beam to the right side -->
    <rect x="18" y="14" width="14" height="4" rx="2" fill="#BB8FFF" opacity="0.9"/>
    <rect x="20" y="15" width="12" height="2" rx="1" fill="#EECCFF" opacity="0.8"/>
    <!-- Energy splash at impact edge -->
    <circle cx="32" cy="16" r="3" fill="#9B6FE8" opacity="0.7"/>
    <line x1="30" y1="14" x2="32" y2="12" stroke="#BB8FFF" stroke-width="1" opacity="0.7"/>
    <line x1="30" y1="18" x2="32" y2="20" stroke="#BB8FFF" stroke-width="1" opacity="0.7"/>
    <!-- Second small bolt from left hand -->
    <rect x="0"  y="14" width="8"  height="3" rx="1" fill="#7B4FC8" opacity="0.6"/>
    <!-- Wispy robe hem — disrupted by release -->
    <ellipse cx="16" cy="30" rx="10" ry="3"   fill="#2A1A4A" opacity="0.3"/>
    <ellipse cx="15" cy="28" rx="9"  ry="4"   fill="#2A1A4A" opacity="0.5"/>
    <!-- Lower robe -->
    <rect x="9"  y="17" width="14" height="13" rx="5" fill="#2A1A4A" opacity="0.85"/>
    <!-- Upper torso recoiling slightly left -->
    <rect x="10" y="7"  width="10" height="12" rx="2" fill="#2A1A4A"/>
    <!-- Cloak blown back by energy release -->
    <rect x="1"  y="9"  width="10" height="9"  rx="2" fill="#1A1030" opacity="0.9" transform="rotate(-35,6,13)"/>
    <rect x="21" y="7"  width="10" height="9"  rx="2" fill="#1A1030" opacity="0.9" transform="rotate(15,26,11)"/>
    <!-- Right arm extended firing -->
    <rect x="19" y="14" width="10" height="4"  rx="2" fill="#2A1A4A"/>
    <!-- Left arm recoiling back -->
    <rect x="3"  y="15" width="7"  height="3"  rx="2" fill="#2A1A4A"/>
    <!-- Sigil — depleted but still visible -->
    <rect x="13" y="12" width="6"  height="1"  fill="#7B4FC8"/>
    <rect x="15" y="10" width="2"  height="5"  fill="#7B4FC8"/>
    <!-- Head — slightly offset from recoil -->
    <ellipse cx="15" cy="5" rx="6" ry="5" fill="#1A1030"/>
    <!-- Eyes — bright during release -->
    <rect x="10" y="4"  width="3"  height="2"  fill="#DD99FF"/>
    <rect x="16" y="4"  width="3"  height="2"  fill="#DD99FF"/>
  </g>

  <!-- Frame 2: Afterglow — arms drawing back, energy fading, robe settling -->
  <g transform="translate(64,0)">
    <!-- Wispy robe hem settling -->
    <ellipse cx="16" cy="30" rx="10" ry="4"  fill="#2A1A4A" opacity="0.3"/>
    <ellipse cx="16" cy="28" rx="8"  ry="4"  fill="#2A1A4A" opacity="0.5"/>
    <!-- Lower robe -->
    <rect x="10" y="18" width="12" height="12" rx="4" fill="#2A1A4A" opacity="0.8"/>
    <!-- Upper torso returning -->
    <rect x="11" y="8"  width="10" height="12" rx="2" fill="#2A1A4A"/>
    <!-- Cloak settling back -->
    <rect x="4"  y="10" width="8"  height="8"  rx="2" fill="#1A1030" opacity="0.85" transform="rotate(-15,8,14)"/>
    <rect x="20" y="10" width="8"  height="8"  rx="2" fill="#1A1030" opacity="0.85" transform="rotate(15,24,14)"/>
    <!-- Arms returning inward -->
    <rect x="3"  y="14" width="8"  height="4"  rx="2" fill="#2A1A4A" opacity="0.8"/>
    <rect x="21" y="14" width="8"  height="4"  rx="2" fill="#2A1A4A" opacity="0.8"/>
    <!-- Fading energy residue at palms -->
    <circle cx="4"  cy="16" r="2" fill="#5A3A80" opacity="0.4"/>
    <circle cx="28" cy="16" r="2" fill="#5A3A80" opacity="0.4"/>
    <!-- Sigil cooling back to normal -->
    <rect x="14" y="13" width="4"  height="1"  fill="#7B4FC8"/>
    <rect x="15" y="11" width="2"  height="5"  fill="#7B4FC8"/>
    <!-- Head / hood -->
    <ellipse cx="16" cy="6" rx="6" ry="6" fill="#1A1030"/>
    <!-- Eye sockets returning to normal glow -->
    <rect x="12" y="5"  width="3"  height="2"  fill="#C8A0FF"/>
    <rect x="17" y="5"  width="3"  height="2"  fill="#C8A0FF"/>
  </g>
</svg>
