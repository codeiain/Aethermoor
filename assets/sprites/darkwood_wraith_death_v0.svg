<svg xmlns="http://www.w3.org/2000/svg" width="96" height="32" viewBox="0 0 96 32" role="img" aria-label="Darkwood Wraith Death Animation — 3 frames">
  <!-- E-5 Darkwood Wraith — death animation, 3×32x32 sprite sheet -->
  <!-- Palette: robe #2A1A4A fading to transparent, sigil #7B4FC8 dimming, wisps #9B6FE8 dispersing -->
  <!-- Death: form becomes translucent, shatters into wisps, fades to nothing -->
  <!-- Phaser frame strip: frame 0 x=0, frame 1 x=32, frame 2 x=64 -->

  <!-- Frame 0: Fading — form becoming translucent, robe fraying, sigil flickering out -->
  <g transform="translate(0,0)">
    <!-- Robe hem fading -->
    <ellipse cx="16" cy="30" rx="10" ry="4"  fill="#2A1A4A" opacity="0.2"/>
    <ellipse cx="16" cy="28" rx="8"  ry="4"  fill="#2A1A4A" opacity="0.35"/>
    <!-- Lower robe — becoming see-through -->
    <rect x="10" y="18" width="12" height="12" rx="4" fill="#2A1A4A" opacity="0.5"/>
    <!-- Upper torso — translucent -->
    <rect x="11" y="8"  width="10" height="12" rx="2" fill="#2A1A4A" opacity="0.5"/>
    <!-- Cloak wings fragmenting -->
    <rect x="4"  y="10" width="8"  height="8"  rx="2" fill="#1A1030" opacity="0.5" transform="rotate(-15,8,14)"/>
    <rect x="20" y="10" width="8"  height="8"  rx="2" fill="#1A1030" opacity="0.5" transform="rotate(15,24,14)"/>
    <!-- Sigil flickering — dimming -->
    <rect x="14" y="13" width="4"  height="1"  fill="#7B4FC8" opacity="0.5"/>
    <rect x="15" y="11" width="2"  height="5"  fill="#7B4FC8" opacity="0.5"/>
    <!-- Small wisps beginning to escape -->
    <circle cx="8"  cy="12" r="1.5" fill="#7B4FC8" opacity="0.5"/>
    <circle cx="24" cy="12" r="1.5" fill="#7B4FC8" opacity="0.5"/>
    <circle cx="16" cy="6"  r="1"   fill="#9B6FE8" opacity="0.4"/>
    <!-- Head / hood going transparent -->
    <ellipse cx="16" cy="6" rx="6" ry="6" fill="#1A1030" opacity="0.55"/>
    <!-- Eye sockets dimming to dull purple -->
    <rect x="12" y="5"  width="3"  height="2"  fill="#7B4FC8" opacity="0.5"/>
    <rect x="17" y="5"  width="3"  height="2"  fill="#7B4FC8" opacity="0.5"/>
    <!-- Cracks of light showing through form -->
    <line x1="13" y1="8"  x2="19" y2="8"  stroke="#9B6FE8" stroke-width="1" opacity="0.4"/>
    <line x1="12" y1="14" x2="20" y2="14" stroke="#9B6FE8" stroke-width="1" opacity="0.35"/>
  </g>

  <!-- Frame 1: Dispersing — body shattering into wisps and particles -->
  <g transform="translate(32,0)">
    <!-- Wisps and fragments scattering in all directions -->
    <!-- Large robe fragments -->
    <rect x="8"  y="12" width="6"  height="8"  rx="2" fill="#2A1A4A" opacity="0.4" transform="rotate(-20,11,16)"/>
    <rect x="18" y="10" width="6"  height="8"  rx="2" fill="#1A1030" opacity="0.4" transform="rotate(25,21,14)"/>
    <rect x="10" y="20" width="5"  height="6"  rx="2" fill="#2A1A4A" opacity="0.35" transform="rotate(-10,12,23)"/>
    <rect x="17" y="22" width="5"  height="5"  rx="2" fill="#2A1A4A" opacity="0.35" transform="rotate(15,19,24)"/>
    <!-- Wisp trails spiraling outward -->
    <circle cx="6"  cy="8"  r="2"   fill="#7B4FC8" opacity="0.6"/>
    <circle cx="26" cy="7"  r="2"   fill="#9B6FE8" opacity="0.6"/>
    <circle cx="4"  cy="20" r="1.5" fill="#7B4FC8" opacity="0.5"/>
    <circle cx="28" cy="19" r="1.5" fill="#7B4FC8" opacity="0.5"/>
    <circle cx="10" cy="4"  r="1.5" fill="#9B6FE8" opacity="0.55"/>
    <circle cx="22" cy="4"  r="1.5" fill="#9B6FE8" opacity="0.55"/>
    <circle cx="16" cy="3"  r="1"   fill="#BB8FFF" opacity="0.5"/>
    <!-- Central ghost — head remnant still visible but disintegrating -->
    <ellipse cx="16" cy="14" rx="5" ry="5"   fill="#1A1030" opacity="0.3"/>
    <!-- Sigil fragment — still glowing faintly -->
    <rect x="14" y="13" width="4"  height="1"  fill="#5A3A80" opacity="0.4"/>
    <rect x="15" y="12" width="2"  height="3"  fill="#5A3A80" opacity="0.35"/>
    <!-- Eye traces -->
    <circle cx="13" cy="12" r="1.5" fill="#7B4FC8" opacity="0.4"/>
    <circle cx="19" cy="12" r="1.5" fill="#7B4FC8" opacity="0.4"/>
    <!-- Particle trail lines -->
    <line x1="16" y1="14" x2="5"  y2="5"  stroke="#7B4FC8" stroke-width="1"   opacity="0.35"/>
    <line x1="16" y1="14" x2="27" y2="5"  stroke="#9B6FE8" stroke-width="1"   opacity="0.35"/>
    <line x1="16" y1="14" x2="3"  y2="22" stroke="#5A3A80" stroke-width="0.8" opacity="0.3"/>
    <line x1="16" y1="14" x2="29" y2="22" stroke="#5A3A80" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Frame 2: Gone — just fading wisps, nothing solid remaining -->
  <g transform="translate(64,0)">
    <!-- Scattered wisps drifting upward and outward — barely visible -->
    <circle cx="16" cy="6"  r="2.5" fill="#7B4FC8"  opacity="0.25"/>
    <circle cx="10" cy="10" r="2"   fill="#5A3A80"  opacity="0.2"/>
    <circle cx="22" cy="10" r="2"   fill="#5A3A80"  opacity="0.2"/>
    <circle cx="7"  cy="17" r="1.5" fill="#7B4FC8"  opacity="0.18"/>
    <circle cx="25" cy="17" r="1.5" fill="#7B4FC8"  opacity="0.18"/>
    <circle cx="12" cy="22" r="1.5" fill="#4A2A60"  opacity="0.2"/>
    <circle cx="20" cy="22" r="1.5" fill="#4A2A60"  opacity="0.2"/>
    <circle cx="4"  cy="14" r="1"   fill="#5A3A80"  opacity="0.15"/>
    <circle cx="28" cy="14" r="1"   fill="#5A3A80"  opacity="0.15"/>
    <circle cx="16" cy="25" r="1.5" fill="#3A1A50"  opacity="0.2"/>
    <!-- Very faint wisp trails -->
    <line x1="16" y1="8"  x2="8"  y2="3"  stroke="#5A3A80" stroke-width="1" opacity="0.2"/>
    <line x1="16" y1="8"  x2="24" y2="3"  stroke="#5A3A80" stroke-width="1" opacity="0.2"/>
    <!-- Barely-there sigil echo -->
    <rect x="15" y="15" width="2"  height="1"  fill="#3A1A50" opacity="0.3"/>
    <rect x="15" y="14" width="2"  height="3"  fill="#3A1A50" opacity="0.2"/>
    <!-- Ground shadow — the faintest trace that something was here -->
    <ellipse cx="16" cy="30" rx="8"  ry="2"  fill="#1A0A30" opacity="0.2"/>
  </g>
</svg>
