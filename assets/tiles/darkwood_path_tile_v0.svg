<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Darkwood Path Tile">
  <!-- Darkwood Forest path tile — packed earth, worn stone edges, 32x32 -->
  <defs>
    <linearGradient id="dw-path" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D2218"/>
      <stop offset="100%" stop-color="#3D3020"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" fill="url(#dw-path)"/>
  <!-- Left edge stones -->
  <rect x="0" y="4"  width="3" height="6" fill="#4E3E2A"/>
  <rect x="0" y="18" width="3" height="8" fill="#4E3E2A"/>
  <!-- Right edge stones -->
  <rect x="29" y="10" width="3" height="7" fill="#4E3E2A"/>
  <rect x="29" y="24" width="3" height="6" fill="#4E3E2A"/>
  <!-- Centre wear lines -->
  <rect x="8" y="12" width="16" height="1" fill="#3D3020" opacity="0.5"/>
  <rect x="6" y="22" width="20" height="1" fill="#3D3020" opacity="0.4"/>
</svg>
