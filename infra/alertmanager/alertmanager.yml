global:
  # How long to wait before sending a notification again if it has already been sent
  resolve_timeout: 5m

  # SMTP config — set these env vars in .env to enable email alerting
  # smtp_smarthost: '${SMTP_HOST}:${SMTP_PORT}'
  # smtp_from: '${SMTP_FROM}'
  # smtp_auth_username: '${SMTP_USER}'
  # smtp_auth_password: '${SMTP_PASSWORD}'

route:
  group_by: ['alertname', 'team']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'

  routes:
    # Critical alerts route immediately, no grouping delay
    - match:
        severity: critical
      group_wait: 10s
      repeat_interval: 1h
      receiver: 'critical'

    # Security alerts go to dedicated receiver
    - match:
        team: security
      receiver: 'security'

receivers:
  # Default receiver: webhook (configure ALERTMANAGER_WEBHOOK_URL in .env)
  - name: 'default'
    webhook_configs:
      - url: '${ALERTMANAGER_WEBHOOK_URL:-http://localhost:9999/alert}'
        send_resolved: true
        http_config:
          tls_config:
            insecure_skip_verify: false

  # Critical alerts — same webhook but separate receiver for routing clarity
  - name: 'critical'
    webhook_configs:
      - url: '${ALERTMANAGER_WEBHOOK_URL:-http://localhost:9999/alert}'
        send_resolved: true

  # Security alerts receiver
  - name: 'security'
    webhook_configs:
      - url: '${ALERTMANAGER_WEBHOOK_URL:-http://localhost:9999/alert}'
        send_resolved: true

inhibit_rules:
  # If a service is completely down, suppress latency/error-rate warnings for it
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '(GatewayHighErrorRate|ServiceHighErrorRate|GatewayHighLatency)'
    equal: ['job']
