# AETHERMOOR — Docker Compose skeleton
# Zero-trust: all inter-service calls require X-Service-Token (HMAC-SHA256)
# Network isolation:
#   public  — gateway + frontend only (exposed to host)
#   internal — all backend services (no direct host access)

networks:
  public:
  internal:
    internal: true

volumes:
  postgres_data:
  redis_data:

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - internal
  environment:
    SERVICE_TOKEN: ${SERVICE_TOKEN:?SERVICE_TOKEN must be set}
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ── Monitoring ─────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
      - ./loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - public
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - public
      - internal
    depends_on:
      - loki
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis-exporter:
    image: bitnami/redis-exporter:latest
    container_name: redis-exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "9121:9121"
    networks:
      - public
      - internal
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    environment:
      - TZ=${TZ:-UTC}
    networks:
      - public
      - internal
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
        - "${GRAFANA_PORT:-5007}:3000"
    volumes:
      - ./grafana-data:/var/lib/grafana
      - ./grafana:/etc/grafana/provisioning
    environment:
      - TZ=${TZ:-UTC}
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - public
      - internal
    depends_on:
      - loki

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    networks:
      - public
      - internal
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    command:
      - --housekeeping_interval=10s
      - --docker_only=true
    security_opt:
      - no-new-privileges:true
    privileged: false
    environment:
      - TZ=UTC
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - internal
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: aethermoor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aethermoor}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?}
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Gateway (public-facing) ──────────────────────────────────────────────────

  gateway:
    <<: *service-defaults
    build:
      context: ../services/gateway
      dockerfile: ../../infra/Dockerfile.service
    networks:
      - public
      - internal
    ports:
      - "8000:8000"
    environment:
      SERVICE_TOKEN: ${SERVICE_TOKEN:?}
      AUTH_SERVICE_URL: http://auth:8001
      CHARACTER_SERVICE_URL: http://character:8002
      WORLD_SERVICE_URL: http://world:8003
      COMBAT_SERVICE_URL: http://combat:8004
      CHAT_SERVICE_URL: http://chat:8005
      INVENTORY_SERVICE_URL: http://inventory:8006
      QUEST_SERVICE_URL: http://quest:8007
      ECONOMY_SERVICE_URL: http://economy:8008
      NOTIFICATION_SERVICE_URL: http://notification:8009
      WEBSOCKET_GATEWAY_URL: ws://websocket-gateway:8010
      PARTY_SERVICE_URL: http://party:8011
      SOCIAL_SERVICE_URL: http://social:8012
      CRAFTING_SERVICE_URL: http://crafting:8013
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Backend Services ─────────────────────────────────────────────────────────

  auth:
    <<: *service-defaults
    build:
      context: ../services/auth
      dockerfile: ../../infra/Dockerfile.service
    command: uvicorn main:app --host 0.0.0.0 --port 8001
    networks:
      - public
      - internal
    ports:
      - "8001:8001"
    environment:
      SERVICE_TOKEN: ${SERVICE_TOKEN:?}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/aethermoor
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:?}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  character:
    <<: *service-defaults
    build:
      context: ../services/character
      dockerfile: ../../infra/Dockerfile.service
    command: uvicorn main:app --host 0.0.0.0 --port 8002
    networks:
      - public
      - internal
    ports:
      - "8002:8002"
    environment:
      SERVICE_TOKEN: ${SERVICE_TOKEN:?}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/aethermoor
      AUTH_SERVICE_URL: http://auth:8001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_healthy

  world:
    <<: *service-defaults
    build:
      context: ../services/world
      dockerfile: ../../infra/Dockerfile.service
    command: uvicorn main:app --host 0.0.0.0 --port 8003
    networks:
      - public
      - internal
    ports:
      - "8003:8003"
    environment:
      SERVICE_TOKEN: ${SERVICE_TOKEN:?}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/aethermoor
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      AUTH_SERVICE_URL: http://auth:8001
      CHARACTER_SERVICE_URL: http://character:8002
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth:
        condition: service_healthy
      character:
        condition: service_healthy

  combat:
    <<: *service-defaults
    build:
      context: ../services/combat
      dockerfile: ../../infra/Dockerfile.service
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8004"]
    networks:
      - public
      - internal
    ports:
      - "8004:8004"
    environment:
      SERVICE_TOKEN: ${SERVICE_TOKEN:?}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/aethermoor
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  chat:
    <<: *service-defaults
    build:
      context: ../services/chat
      dockerfile: ../../infra/Dockerfile.service
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8005"]
    networks:
      - public
      - internal
    ports:
      - "8005:8005"
    environment:
      SERVICE_TOKEN: ${SERVICE_TOKEN:?}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/aethermoor
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  inventory:
    <<: *service-defaults
    build:
      context: ../services/inventory
      dockerfile: ../../infra/Dockerfile.service
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8006"]
    ports:
      - "8006:8006"
    networks:
      - public
      - internal
    environment:
      SERVICE_TOKEN: ${SERVICE_TOKEN:?}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/aethermoor
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy

  quest:
    <<: *service-defaults
    build:
      context: ../services/quest
      dockerfile: ../../infra/Dockerfile.service
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8007"]
    ports:
      - "8007:8007"
    networks:
      - public
      - internal
    environment:
      SERVICE_TOKEN: ${SERVICE_TOKEN:?}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/aethermoor
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy

  economy:
    <<: *service-defaults
    build:
      context: ../services/economy
      dockerfile: ../../infra/Dockerfile.service
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8008"]
    ports:
      - "8008:8008"
    networks:
      - public
      - internal
    environment:
      SERVICE_TOKEN: ${SERVICE_TOKEN:?}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/aethermoor
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/8
      AUTH_SERVICE_URL: http://auth:8001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth:
        condition: service_healthy

  notification:
    <<: *service-defaults
    build:
      context: ../services/notification
      dockerfile: ../../infra/Dockerfile.service
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8009"]
    ports:
      - "8009:8009"
    networks:
      - public
      - internal
    environment:
      SERVICE_TOKEN: ${SERVICE_TOKEN:?}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/aethermoor
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  websocket-gateway:
