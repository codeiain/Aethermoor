    build:
      context: ../services/crafting
      dockerfile: ../../infra/Dockerfile.service
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8013"]
    ports:
      - "8013:8013"
    networks:
      - public
      - internal
    environment:
      SERVICE_TOKEN: ${SERVICE_TOKEN:?}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/aethermoor
      AUTH_SERVICE_URL: http://auth:8001
      CHARACTER_SERVICE_URL: http://character:8002
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8013/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_healthy
      character:
        condition: service_healthy

  # ── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ../frontend
      dockerfile: ../infra/Dockerfile.frontend
    networks:
      - public
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      - gateway
