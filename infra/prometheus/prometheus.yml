global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Grafana metrics
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: '/metrics'

  # cAdvisor - Container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Redis Exporter metrics
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Backend services
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:8000']
  - job_name: 'auth'
    static_configs:
      - targets: ['auth:8001']
  - job_name: 'character'
    static_configs:
      - targets: ['character:8002']
  - job_name: 'world'
    static_configs:
      - targets: ['world:8003']
  - job_name: 'combat'
    static_configs:
      - targets: ['combat:8004']
  - job_name: 'chat'
    static_configs:
      - targets: ['chat:8005']
  - job_name: 'inventory'
    static_configs:
      - targets: ['inventory:8006']
  - job_name: 'quest'
    static_configs:
      - targets: ['quest:8007']
  - job_name: 'economy'
    static_configs:
      - targets: ['economy:8008']
  - job_name: 'notification'
    static_configs:
      - targets: ['notification:8009']
  - job_name: 'websocket-gateway'
    static_configs:
      - targets: ['websocket-gateway:8010']
  - job_name: 'party'
    static_configs:
      - targets: ['party:8011']
  - job_name: 'social'
    static_configs:
      - targets: ['social:8012']
  - job_name: 'crafting'
    static_configs:
      - targets: ['crafting:8013']
