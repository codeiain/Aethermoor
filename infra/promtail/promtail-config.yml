server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Use container name as job label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'job'
      
      # Add container ID
      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'
      
      # Add container image
      - source_labels: ['__meta_docker_container_image']
        target_label: 'image'
      
      # Add container labels as Loki labels
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'
      
      # Add environment label
      - replacement: 'docker'
        target_label: 'environment'
      
      # Add hostname
      - replacement: 'aethermoor'
        target_label: 'namespace'
    
    pipeline_stages:
      # Parse JSON logs if present
      - json:
          expressions:
            level: level
            msg: message
            timestamp: time
      
      # Extract log level from common formats
      - regex:
          expression: '(?P<level>INFO|WARN|ERROR|DEBUG|FATAL|TRACE)'
      
      # Set labels from extracted fields
      - labels:
          level:
      
      # Parse timestamp if available
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - "2006-01-02T15:04:05.999999999Z07:00"
            - "2006-01-02 15:04:05"
